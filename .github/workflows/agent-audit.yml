name: Agent Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 6 AM UTC

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install chromium --with-deps

      - name: Build app
        working-directory: web
        run: npm run build

      - name: Start app
        working-directory: web
        run: npm run start &
        env:
          PORT: 3001

      - name: Wait for app
        run: |
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "503" ]; then
              echo "App is ready (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_CODE, retrying..."
            sleep 2
          done
          echo "App failed to start after 60 seconds"
          exit 1

      - name: Run audit suite
        working-directory: web
        run: |
          mkdir -p ../docs/audit-results
          npx playwright test --project=audit --reporter=json > ../docs/audit-results/test-results.json

      - name: Generate report
        if: always()
        run: ./scripts/generate-report.sh docs/audit-results docs/audit-results/reports/$(date +%Y-%m-%d).md

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-results-${{ github.run_number }}
          path: docs/audit-results/
          retention-days: 30

      - name: File issues for failures
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FAILURES=$(jq -r '.suites[]?.specs[]? | select(.ok == false) | .title' \
            docs/audit-results/test-results.json 2>/dev/null || echo "")
          if [ -n "$FAILURES" ]; then
            while IFS= read -r title; do
              [ -z "$title" ] && continue
              ./scripts/file-github-issue.sh "$title" "Audit failure in CI" || true
            done <<< "$FAILURES"
          fi
